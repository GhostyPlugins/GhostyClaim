expansion:
  started: |-
    {prefix}&aYou entered &bClaim Expansion Mode&a for &f{name}&a!
    &7Current size: &f{area} blocks &8(&f{minX},{minZ} &8→ &f{maxX},{maxZ}&8)
    &7➜ Place &f4 Redstone Torches &7around the &enew, larger &7boundary.
    &7➜ The new area &emust fully contain &7your original claim.
    &7➜ Only the &eprice difference &7will be charged.
    &7➜ Click &a✔ Expand &7to confirm, &c✖ Cancel &7to abort.
  success: "{prefix}&aClaim &f\"{name}\" &aexpanded! &7(&f{oldArea} &7→ &f{newArea} &7blocks)"
  must-contain-original: "{prefix}&cThe new area must fully enclose your original claim! &7The original corners must be inside the new boundary."
